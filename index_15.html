<!DOCTYPE html>

<style>
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tosticentro · Operaciones</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --nav-bg:#171f32;--nav-w:72px;--panel-w:248px;
  --border:#E8EAEE;--surface:#F7F8FA;--card:#fff;
  --ink:#1C1E22;--ink2:#52596A;--ink3:#6B7585;--ink4:#C4CAD6;
  --accent:#16A364;--accent-l:#EDFAF4;--accent-d:#0C6B47;
  --warn:#C07A10;--warn-l:#FEF9EC;
  --danger:#C93535;--danger-l:#FDF2F2;
  --blue:#2563EB;--blue-l:#EEF4FF;--blue-d:#1D3E87;
  --ease:cubic-bezier(0.22,1,0.36,1);--dur:160ms;
}
@keyframes fade-up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes slide-r{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes sk{0%,100%{opacity:.45}50%{opacity:.9}}
@keyframes bar{from{width:0}to{width:var(--bw,0%)}}
@keyframes sso-in{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
@keyframes sso-out{from{opacity:1}to{opacity:0;transform:scale(.98)}}
@keyframes logo-pop{0%{opacity:0;transform:scale(.7)}60%{transform:scale(1.06)}100%{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes check{from{stroke-dashoffset:30}to{stroke-dashoffset:0}}
@keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:.25}}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:var(--ink);line-height:1.5;overflow:hidden;}
.app{display:flex;height:100vh;overflow:hidden;background:var(--surface);}
.nav1{width:var(--nav-w);background:var(--nav-bg);display:flex;flex-direction:column;align-items:center;padding:0 0 12px;flex-shrink:0;z-index:10;}
.nav1-logo{width:100%;padding:12px 0 10px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:8px;}
.n1-item{width:44px;height:44px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:rgba(255,255,255,.35);transition:all var(--dur);margin-bottom:2px;position:relative;}
.n1-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);}
.n1-item.active{background:rgba(22,163,100,.15);color:#fff;}
.n1-item.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
.n1-ico{font-size:16px;line-height:1;}
.n1-lbl{font-size:8.5px;font-weight:500;letter-spacing:.03em;text-transform:uppercase;}
.n1-badge{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:1.5px solid var(--nav-bg);}
.n1-spacer{flex:1;}
.nav2{width:var(--panel-w);background:var(--nav-bg);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;flex-shrink:0;padding:0 0 12px;overflow-y:auto;}
.n2-header{padding:16px 16px 10px;border-bottom:1px solid rgba(255,255,255,.06);}
.n2-section-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.9);}
.n2-section-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;}
.n2-search{margin:10px 12px 6px;position:relative;}
.n2-search input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:6px 10px 6px 28px;color:rgba(255,255,255,.7);font-size:11.5px;outline:none;font-family:inherit;transition:all var(--dur);}
.n2-search input::placeholder{color:rgba(255,255,255,.25);}
.n2-search input:focus{background:rgba(255,255,255,.1);border-color:rgba(22,163,100,.5);}
.n2-search-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:rgba(255,255,255,.25);pointer-events:none;}
.n2-group{margin-top:6px;}
.n2-group-lbl{padding:8px 14px 3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.22);}
.n2-item{display:flex;align-items:center;gap:8px;padding:7px 12px;margin:1px 8px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.45);font-size:12px;transition:all var(--dur);}
.n2-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.75);}
.n2-item.active{background:rgba(255,255,255,.09);color:#fff;font-weight:500;}
.n2-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0;transition:background var(--dur);}
.n2-item.active .n2-dot{background:var(--accent);}
.n2-count{margin-left:auto;font-size:10px;color:rgba(255,255,255,.28);padding:1px 5px;border-radius:8px;background:rgba(255,255,255,.06);}
.n2-count.r{color:rgba(240,128,128,.8);background:rgba(201,53,53,.18);}
.n2-filters{padding:10px 12px 6px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto;}
.n2-filters-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.22);margin-bottom:6px;}
.n2-filter-item{display:flex;align-items:center;justify-content:space-between;padding:5px 4px;font-size:11px;color:rgba(255,255,255,.4);}
.n2-filter-val{font-size:10px;color:rgba(255,255,255,.25);background:rgba(255,255,255,.06);padding:1px 6px;border-radius:5px;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.main-bar{height:44px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.main-bar-crumb{font-size:11px;color:var(--ink3);flex:1;}
.main-bar-crumb b{color:var(--ink2);font-weight:500;}
.mb-chip{border-radius:6px;padding:3px 10px;font-size:11px;font-weight:500;border:1px solid;cursor:pointer;transition:opacity var(--dur);}
.mb-chip:hover{opacity:.75;}
.chip-d{background:var(--danger-l);color:var(--danger);border-color:rgba(201,53,53,.15);}
.chip-g{background:var(--accent-l);color:var(--accent-d);border-color:rgba(22,163,100,.2);display:flex;align-items:center;gap:5px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:dot-pulse 2s ease-in-out infinite;}
.main-content{flex:1;overflow-y:auto;}
/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:transform var(--dur),border-color var(--dur);cursor:default;}
.kpi:hover{transform:translateY(-1px);border-color:var(--ink4);}
.kpi-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:9px;}
.kpi-v{font-size:28px;font-weight:400;letter-spacing:-.03em;color:var(--ink);line-height:1;}
.kpi-d{font-size:11px;margin-top:5px;color:var(--ink3);}
.kpi-d.g{color:var(--accent-d);}
.kpi-d.r{color:var(--danger);}
.kpi-d.a{color:var(--warn);}
/* Alerts */
.alerts-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:18px;}
.alert-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all var(--dur);}
.alert-card:hover{transform:translateY(-1px);border-color:var(--ink4);}
.alert-card.r{border-left:3px solid var(--danger);}
.alert-card.a{border-left:3px solid var(--warn);}
.alert-card.b{border-left:3px solid var(--blue);}
.alert-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ai-r{background:var(--danger-l);}
.ai-a{background:var(--warn-l);}
.ai-b{background:var(--blue-l);}
.alert-val{font-size:18px;font-weight:500;color:var(--ink);line-height:1;}
.alert-lbl{font-size:11px;color:var(--ink3);margin-top:1px;}
.alert-arrow{margin-left:auto;font-size:13px;color:var(--ink4);}
/* OV cards */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.oc-head{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;}
.oc-title{font-size:12px;font-weight:600;color:var(--ink);flex:1;}
.oc-link{font-size:11px;color:var(--ink3);cursor:pointer;transition:color var(--dur);}
.oc-link:hover{color:var(--accent);}
.oc-row{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--dur);}
.oc-row:last-child{border-bottom:none;}
.oc-row:hover{background:var(--surface);}
.oc-id{font-size:11px;font-weight:600;color:var(--ink);width:68px;flex-shrink:0;}
.oc-name{font-size:11px;color:var(--ink2);flex:1;}
.oc-time{font-size:10px;color:var(--ink3);}
/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10.5px;white-space:nowrap;}
.t-r{background:var(--danger-l);color:var(--danger);}
.t-a{background:var(--warn-l);color:var(--warn);}
.t-g{background:var(--accent-l);color:var(--accent-d);}
.t-b{background:var(--blue-l);color:var(--blue-d);border:1px solid #BFDBFE;}
.t-n{background:var(--surface);color:var(--ink2);border:1px solid var(--border);}
/* Table */
.tbl-wrap{display:flex;flex-direction:column;height:100%;}
.tbl-topbar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tbl-title{font-size:13px;font-weight:600;color:var(--ink);}
.tbl-count{font-size:11px;color:var(--ink3);background:var(--surface);border:1px solid var(--border);padding:1px 7px;border-radius:20px;}
.filter-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--ink2);font-size:11px;cursor:pointer;transition:all var(--dur);font-family:inherit;}
.filter-btn:hover{border-color:var(--ink4);color:var(--ink);}
.filter-btn.active{background:var(--blue-l);color:var(--blue-d);border-color:#BFDBFE;}
.th{display:grid;gap:8px;padding:7px 20px;background:var(--surface);border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;}
.tr{display:grid;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;background:var(--card);transition:background var(--dur);animation:fade-up var(--dur) var(--ease) var(--rd,0ms) both;}
.tr:hover{background:#F4F7FF;}
.tr.sel{background:var(--blue-l);border-left:2px solid var(--blue);}
.tr.sel .c-id{color:var(--blue-d);}
.c-id{font-size:12px;font-weight:600;color:var(--ink);}
.c-sub{font-size:11px;color:var(--ink3);margin-top:1px;}
.c-txt{font-size:12px;color:var(--ink2);}
.risk-wrap{display:flex;align-items:center;gap:5px;}
.risk-bar{height:4px;border-radius:2px;background:var(--border);width:40px;overflow:hidden;}
.risk-fill{height:100%;border-radius:2px;animation:bar .5s var(--ease) both;width:var(--bw,0%);}
.ib{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--ink3);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--dur);}
.ib:hover{background:var(--ink);color:#fff;border-color:transparent;transform:translateX(1px);}
.scroll-list{overflow-y:auto;flex:1;}
/* Skeleton */
.sk-block{border-radius:4px;background:var(--border);animation:sk 1.4s ease-in-out infinite;}
.sk-circle{border-radius:50%;background:var(--border);animation:sk 1.4s ease-in-out infinite;}
/* Drawer */
.drawer-overlay{position:fixed;inset:0;z-index:200;pointer-events:none;}
.drawer-overlay.open{pointer-events:all;}
.drawer-scrim{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background 220ms ease;}
.drawer-overlay.open .drawer-scrim{background:rgba(0,0,0,0.12);}
.drawer-panel{position:absolute;top:0;right:0;bottom:0;width:420px;background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform 220ms var(--ease);box-shadow:-4px 0 24px rgba(0,0,0,0.06);}
.drawer-overlay.open .drawer-panel{transform:none;}
.dr-head{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;flex-shrink:0;background:var(--nav-bg);}
.dr-av{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);flex-shrink:0;}
.dr-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.01em;}
.dr-meta{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}
.dr-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px;}
.dr-chip{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.dr-close{margin-left:auto;width:24px;height:24px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--dur);flex-shrink:0;}
.dr-close:hover{background:rgba(255,255,255,.1);color:#fff;}
.dr-body{flex:1;overflow-y:auto;}
.dr-block{padding:14px 18px;border-bottom:1px solid var(--border);animation:fade-up var(--dur) var(--ease) both;}
.dr-block:nth-child(2){animation-delay:40ms;}
.dr-block:nth-child(3){animation-delay:80ms;}
.dr-block:nth-child(4){animation-delay:120ms;}
.dr-block:last-child{border-bottom:none;}
.dr-block-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:10px;}
.dr-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);transition:background var(--dur),margin var(--dur),padding var(--dur);}
.dr-row:hover{background:var(--surface);margin:0 -4px;padding:5px 4px;}
.dr-row:last-child{border-bottom:none;}
.dr-k{font-size:11px;color:var(--ink3);}
.dr-v{font-size:11px;color:var(--ink);text-align:right;max-width:200px;}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.compare-col{background:var(--surface);border-radius:7px;padding:10px;}
.compare-col.diff{background:#FEF9EC;border:1px solid rgba(201,130,16,.15);}
.compare-col-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:7px;}
.compare-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid var(--border);}
.compare-row:last-child{border-bottom:none;}
.compare-key{color:var(--ink3);}
.compare-val{font-weight:500;}
.compare-val.mismatch{color:var(--danger);}
.compare-val.ok{color:var(--accent-d);}
.tl-item{display:flex;gap:10px;padding-bottom:13px;position:relative;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:7px;top:16px;width:1px;height:calc(100% - 3px);background:var(--border);}
.tl-dot{width:15px;height:15px;border-radius:50%;flex-shrink:0;z-index:1;margin-top:1px;}
.tl-ev{font-size:11.5px;color:var(--ink);line-height:1.4;}
.tl-mt{font-size:10px;color:var(--ink3);margin-top:2px;}
.tl-tag{display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;margin-top:3px;letter-spacing:.02em;}
.dr-actions{padding:12px 18px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.act-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:7px;}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.ab{padding:7px 8px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--ink2);font-size:11px;cursor:pointer;transition:all var(--dur);text-align:center;font-family:inherit;font-weight:500;}
.ab:hover{border-color:var(--ink4);color:var(--ink);transform:translateY(-1px);}
.ab:active{transform:none;}
.ab.p{background:var(--ink);color:rgba(255,255,255,.9);border-color:transparent;}
.ab.p:hover{background:#2a2e3a;}
.ab.d{background:var(--danger-l);color:var(--danger);border-color:rgba(201,53,53,.15);}
.ab.wide{grid-column:span 2;}

#sso{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;}
#sso::before{content:'';position:absolute;inset:0;background:rgba(10,14,22,.52);}
#sso.out{animation:sso-out .3s var(--ease) forwards;pointer-events:none;}
.sso-card{width:360px;position:relative;z-index:1;animation:sso-in .4s var(--ease) .08s both;}
.sso-logo{display:flex;justify-content:center;margin-bottom:32px;animation:logo-pop .5s var(--ease) .15s both;}
.sso-h{font-size:22px;font-weight:400;color:#fff;letter-spacing:-.02em;margin-bottom:5px;animation:sso-in .4s var(--ease) .22s both;}
.sso-sub{font-size:12.5px;color:rgba(255,255,255,.4);margin-bottom:28px;animation:sso-in .4s var(--ease) .28s both;}
.sso-btn{width:100%;padding:12px 16px;border-radius:9px;border:none;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all var(--dur);margin-bottom:9px;font-family:inherit;}
.sso-btn:active{transform:scale(.98);}
.sso-google{background:#fff;color:var(--ink);animation:sso-in .35s var(--ease) .33s both;}
.sso-google:hover{background:#F4F7FA;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.sso-ms{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.12)!important;animation:sso-in .35s var(--ease) .39s both;}
.sso-ms:hover{background:rgba(255,255,255,.13);}
.sso-divider{display:flex;align-items:center;gap:10px;margin:16px 0;animation:sso-in .35s var(--ease) .44s both;}
.sso-divider::before,.sso-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}
.sso-divider span{font-size:11px;color:rgba(255,255,255,.25);}
.sso-email-wrap{animation:sso-in .35s var(--ease) .48s both;}
.sso-input{width:100%;padding:11px 13px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:13px;outline:none;margin-bottom:8px;transition:all var(--dur);font-family:inherit;}
.sso-input::placeholder{color:rgba(255,255,255,.25);}
.sso-input:focus{background:rgba(255,255,255,.1);border-color:rgba(22,163,100,.5);}
.sso-submit{background:var(--accent);color:#fff;}
.sso-submit:hover{background:var(--accent-d);}
.sso-submit.loading{pointer-events:none;background:var(--accent-d);}
.sso-spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
.sso-skip{width:100%;margin-top:16px;background:none;border:none;color:rgba(255,255,255,.28);font-size:12px;cursor:pointer;transition:color var(--dur);padding:5px;font-family:inherit;animation:sso-in .35s var(--ease) .55s both;}
.sso-skip:hover{color:rgba(255,255,255,.55);}
.sso-success{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 0;}
.sso-check{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;animation:logo-pop .4s var(--ease) both;}
.sso-check svg path{stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none;stroke-dasharray:30;stroke-dashoffset:0;animation:check .35s var(--ease) .15s both;}
.sso-wlc{font-size:16px;color:#fff;animation:sso-in .3s var(--ease) .22s both;}
.sso-wlc-sub{font-size:12px;color:rgba(255,255,255,.4);animation:sso-in .3s var(--ease) .3s both;}
</style>
</style>
</head>

         <span class="tbl-title">${titles[sub]||'Socios'}</span>
         <span class="tbl-count">${rows.length}</span>
         <div style="margin-left:auto;display:flex;gap:5px;">
           <button class="filter-btn${sub==='todos'?' active':''}" onclick="goSub('todos')">Todos</button>
           <button class="filter-btn${sub==='activos'?' active':''}" onclick="goSub('activos')">Activos</button>
           <button class="filter-btn${sub==='riesgo'?' active':''}" onclick="goSub('riesgo')">Riesgo</button>
           <button class="filter-btn${sub==='bloqueados'?' active':''}" onclick="goSub('bloqueados')">Bloqueados</button>
         </div>
       </div>
       <div class="th" style="grid-template-columns:1.8fr 1fr 1.2fr 1fr 80px 1fr 28px">
         <span>Socio</span><span>Estado</span><span>Ciudad</span><span>Último pedido</span><span>Riesgo</span><span>Sync</span><span></span>
       </div>
       <div class="scroll-list">`+
       rows.map((s,i)=>`<div class="tr${selId===s.id?' sel':''}" data-id="${s.id}" style="grid-template-columns:1.8fr 1fr 1.2fr 1fr 80px 1fr 28px;--rd:${i*40+60}ms" onclick="openSocioDrawer('${s.id}')"><div style="display:flex;align-items:center;gap:9px"><div style="width:28px;height:28px;border-radius:7px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--ink2);flex-shrink:0">${s.ini}</div><div><div class="c-id">${s.nombre}</div><div class="c-sub">${s.id} · ${s.seg}</div></div></div><div>${tH(s.estado,s.estado)}</div><div class="c-txt">${s.ciudad}</div><div class="c-sub">${s.last}</div><div><div class="risk-wrap"><div class="risk-bar"><div class="risk-fill" style="--bw:${s.riesgo}%;background:${rc(s.riesgo)}"></div></div><span style="font-size:10px;color:${rc(s.riesgo)}">${s.riesgo}%</span></div></div><div>${s.sync?'<span class="tag t-g">Sync OK</span>':'<span class="tag t-a">Desync</span>'}</div><div><button class="ib" onclick="event.stopPropagation();openSocioDrawer('${s.id}')">→</button></div></div>`).join('')+
       `</div></div>`;
}

function renderOp(){
  const maps={pedidos:D.pedidos,incidencias:D.pedidos.filter(p=>p.est==='error'),desincronizados:D.pedidos.filter(p=>!p.sync),requieren:D.pedidos.filter(p=>p.sev==='alta'||p.est==='warn')};
  const rows=maps[sub]||D.pedidos;
  const titles={pedidos:'Todos los pedidos',incidencias:'Incidencias activas',desincronizados:'Desincronizados',requieren:'Requieren acción'};
  const isD=sub==='desincronizados';
  const mc=document.getElementById('main-content');
  mc.innerHTML=
    `<div class="tbl-wrap">
       <div class="tbl-topbar">
         <span class="tbl-title">${titles[sub]}</span>
         <span class="tbl-count">${rows.length}</span>
         <div style="margin-left:auto;display:flex;gap:5px;">
           <button class="filter-btn${sub==='pedidos'?' active':''}" onclick="goSub('pedidos')">Todos</button>
           <button class="filter-btn${sub==='incidencias'?' active':''}" onclick="goSub('incidencias')">Incidencias</button>
           <button class="filter-btn${sub==='desincronizados'?' active':''}" onclick="goSub('desincronizados')">Desync</button>
           <button class="filter-btn${sub==='requieren'?' active':''}" onclick="goSub('requieren')">Acción</button>
         </div>
       </div>
       <div class="th" style="grid-template-columns:1.4fr 1.2fr 1fr ${isD?'1.6fr':'1fr'} 80px 90px 28px">
         <span>Pedido</span><span>Socio</span><span>Estado</span>${isD?'<span>CRM → Logística</span>':'<span>Tipo</span>'}<span>Criticidad</span><span>Sync</span><span></span>
       </div>
       <div class="scroll-list">`+
       rows.map((p,i)=>`<div class="tr${selId===p.id?' sel':''}" data-id="${p.id}" style="grid-template-columns:1.4fr 1.2fr 1fr ${isD?'1.6fr':'1fr'} 80px 90px 28px;--rd:${i*40+60}ms" onclick="openPedidoDrawer('${p.id}')"><div><div class="c-id">${p.id}</div><div class="c-sub">${p.f} · ${p.monto}</div></div><div class="c-txt">${p.socio}</div><div>${tH(p.est,p.lbl)}</div>${isD?`<div style="font-size:11px"><span style="color:var(--danger);font-weight:500">${p.comp.orig.estado}</span><span style="color:var(--ink4);margin:0 4px">→</span><span style="color:var(--ink2)">${p.comp.crm.estado}</span></div>`:`<div class="c-sub">${p.tipo}</div>`}<div><span style="font-size:11px;font-weight:500;color:${sevC[p.sev]||'var(--ink3)'}">● ${p.sev}</span></div><div>${p.sync?'<span class="tag t-g">OK</span>':'<span class="tag t-a">Desync</span>'}</div><div><button class="ib" onclick="event.stopPropagation();openPedidoDrawer('${p.id}')">→</button></div></div>`).join('')+
       `</div></div>`;
}

function openSocioDrawer(id){
  selId=id;
  document.querySelectorAll('.tr').forEach(el=>el.classList.toggle('sel',el.dataset.id===id));
  const s=D.socios.find(x=>x.id===id);if(!s)return;
  const ec={activo:'#0C6B47',riesgo:'#C07A10',bloqueado:'#C93535'};
  const eb={activo:'#EDFAF4',riesgo:'#FEF9EC',bloqueado:'#FDF2F2'};
  document.getElementById('drawer-content').innerHTML=
    `<div class="dr-head"><div class="dr-av">${s.ini}</div><div style="flex:1"><div class="dr-name">${s.nombre}</div><div class="dr-meta">${s.id} · ${s.ciudad}</div><div class="dr-chips"><span class="dr-chip" style="background:${eb[s.estado]};color:${ec[s.estado]}">${s.estado}</span>${s.accion?'<span class="dr-chip" style="background:rgba(201,53,53,.2);color:#F08080">acción requerida</span>':''}<span class="dr-chip" style="background:${s.sync?'rgba(22,163,100,.2)':'rgba(201,130,16,.2)'};color:${s.sync?'#9ED660':'#F5C975'}">${s.sync?'sincronizado':'desincronizado'}</span></div></div><button class="dr-close" onclick="closeDrawer()">✕</button></div>
     <div class="dr-body">
       <div class="dr-block"><div class="dr-block-title">Información general</div><div class="dr-row"><span class="dr-k">Segmento</span><span class="dr-v">${s.seg}</span></div><div class="dr-row"><span class="dr-k">Alta</span><span class="dr-v">${s.alta}</span></div><div class="dr-row"><span class="dr-k">Pedidos totales</span><span class="dr-v">${s.pedidos}</span></div><div class="dr-row"><span class="dr-k">Incidencias</span><span class="dr-v" style="color:${s.inc>1?'var(--danger)':'inherit'}">${s.inc}</span></div><div class="dr-row"><span class="dr-k">Frecuencia</span><span class="dr-v">${s.freq}</span></div><div class="dr-row"><span class="dr-k">Último pedido</span><span class="dr-v">${s.last}</span></div></div>
       <div class="dr-block"><div class="dr-block-title">Historial de pedidos</div>${s.hist.map(p=>`<div class="dr-row" style="cursor:pointer" onclick="openPedidoDrawer('${p.id}')"><span class="dr-k">${p.id} · ${p.f}</span>${tH(p.est,p.lbl)}</div>`).join('')}</div>
       <div class="dr-block"><div class="dr-block-title">Timeline</div>${s.tl.map(t=>`<div class="tl-item"><div class="tl-dot" style="background:${t.bg};border-color:${t.c}30"></div><div><div class="tl-ev">${t.e}</div><div class="tl-mt">${t.m}</div><span class="tl-tag" style="background:${t.bg};color:${t.c}">${t.t}</span></div></div>`).join('')}</div>
     </div>
     <div class="dr-actions"><div class="act-label">Acciones</div><div class="act-grid"><button class="ab p">Editar datos</button><button class="ab">Corregir dir.</button><button class="ab">Reactivar</button><button class="ab d">Escalar</button></div></div>`;
  document.getElementById('drawer').classList.add('open');
  document.addEventListener('keydown',escKey);
}

function openPedidoDrawer(id){
  selId=id;
  document.querySelectorAll('.tr').forEach(el=>el.classList.toggle('sel',el.dataset.id===id));
  const p=D.pedidos.find(x=>x.id===id);if(!p)return;
  const eb={error:'#FDF2F2',warn:'#FEF9EC',ok:'#EDFAF4',info:'#EEF4FF'};
  const ec={error:'#C93535',warn:'#C07A10',ok:'#0C6B47',info:'#1D3E87'};
  const sc={alta:'#C93535',media:'#C07A10',baja:'#16A364'};
  const sb={alta:'#FDF2F2',media:'#FEF9EC',baja:'#EDFAF4'};
  const fields=Object.keys(p.comp.orig);
  document.getElementById('drawer-content').innerHTML=
    `<div class="dr-head"><div class="dr-av" style="border-radius:7px;font-size:10px;font-weight:700">TC</div><div style="flex:1"><div class="dr-name">${p.id}</div><div class="dr-meta">${p.socio} · ${p.monto}</div><div class="dr-chips"><span class="dr-chip" style="background:${eb[p.est]};color:${ec[p.est]}">${p.lbl}</span><span class="dr-chip" style="background:${sb[p.sev]};color:${sc[p.sev]}">${p.sev}</span><span class="dr-chip" style="background:${p.sync?'rgba(22,163,100,.2)':'rgba(201,130,16,.2)'};color:${p.sync?'#9ED660':'#F5C975'}">${p.sync?'sync OK':'desincronizado'}</span></div></div><button class="dr-close" onclick="closeDrawer()">✕</button></div>
     <div class="dr-body">
       <div class="dr-block"><div class="dr-block-title">Resumen del pedido</div><div class="dr-row"><span class="dr-k">Productos</span><span class="dr-v" style="font-size:10.5px">${p.prods}</span></div><div class="dr-row"><span class="dr-k">Dirección</span><span class="dr-v" style="font-size:10.5px">${p.dir}</span></div><div class="dr-row"><span class="dr-k">Ventana</span><span class="dr-v">${p.ventana}</span></div><div class="dr-row"><span class="dr-k">Tipo</span><span class="dr-v">${p.tipo}</span></div><div class="dr-row"><span class="dr-k">Socio</span><span class="dr-v" style="color:var(--blue);cursor:pointer;text-decoration:underline;text-underline-offset:2px" onclick="openSocioDrawer('${p.sid}')">${p.socio} ↗</span></div></div>
       <div class="dr-block"><div class="dr-block-title">Comparación — Original vs CRM</div><div class="compare-grid"><div class="compare-col"><div class="compare-col-title">Origen (original)</div>${fields.map(f=>`<div class="compare-row"><span class="compare-key">${f}</span><span class="compare-val ${p.comp.orig[f]!==p.comp.crm[f]?'mismatch':'ok'}">${p.comp.orig[f]}</span></div>`).join('')}</div><div class="compare-col ${fields.some(f=>p.comp.orig[f]!==p.comp.crm[f])?'diff':''}"><div class="compare-col-title">CRM (actual)</div>${fields.map(f=>`<div class="compare-row"><span class="compare-key">${f}</span><span class="compare-val ${p.comp.orig[f]!==p.comp.crm[f]?'mismatch':'ok'}">${p.comp.crm[f]}</span></div>`).join('')}</div></div></div>
       <div class="dr-block"><div class="dr-block-title">Timeline de eventos</div>${p.tl.map(t=>`<div class="tl-item"><div class="tl-dot" style="background:${t.bg};border-color:${t.c}30"></div><div><div class="tl-ev">${t.e}</div><div class="tl-mt">${t.m}</div><span class="tl-tag" style="background:${t.bg};color:${t.c}">${t.t}</span></div></div>`).join('')}</div>
       <div class="dr-block"><div class="dr-block-title">Panel de incidencia</div><div class="dr-row"><span class="dr-k">Tipo</span><span class="dr-v">${p.tipo}</span></div><div class="dr-row"><span class="dr-k">Criticidad</span><span class="dr-v" style="color:${sc[p.sev]}">${p.sev}</span></div><div class="dr-row"><span class="dr-k">Sync</span><span class="dr-v">${p.sync?'OK':'Desincronizado'}</span></div><div class="dr-row"><span class="dr-k">Última act.</span><span class="dr-v">${p.f}</span></div></div>
     </div>
     <div class="dr-actions"><div class="act-label">Acciones sobre el pedido</div><div class="act-grid"><button class="ab p">Corregir dir.</button><button class="ab">Reasignar</button><button class="ab">Forzar sync</button><button class="ab d">Escalar</button><button class="ab">Recrear</button><button class="ab d">Cancelar</button></div></div>`;
  document.getElementById('drawer').classList.add('open');
  document.addEventListener('keydown',escKey);
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  selId=null;
  document.querySelectorAll('.tr.sel').forEach(el=>el.classList.remove('sel'));
  document.removeEventListener('keydown',escKey);
}
function escKey(e){if(e.key==='Escape')closeDrawer();}

function goSec(s){
  sec=s;
  const def={ov:'resumen',sc:'todos',op:'pedidos',cfg:'general'};
  sub=def[s];selId=null;closeDrawer();
  ['ov','sc','op','cfg'].forEach(k=>{const el=document.getElementById('n1-'+k);if(el)el.classList.toggle('active',k===s);});
  renderNav2();setCrumb();render();
}
function goSub(sb){sub=sb;selId=null;closeDrawer();renderNav2();setCrumb();render();}
function render(){
  if(sec==='ov')renderOv();
  else if(sec==='sc')renderSocios();
  else if(sec==='op')renderOp();
  else document.getElementById('main-content').innerHTML='<div style="padding:40px;color:var(--ink3)">Sección en construcción</div>';
}

function ssoClick(btn,p){
  btn.innerHTML='<div class="sso-spinner"></div>';btn.classList.add('loading');
  setTimeout(()=>ssoSuccess('Bienvenido al sistema'),1300);
}
function ssoEmail(){
  const email=document.getElementById('sso-email').value.trim();
  if(!email){document.getElementById('sso-email').focus();return;}
  const btn=document.getElementById('sso-sub');
  btn.innerHTML='<div class="sso-spinner"></div>';btn.classList.add('loading');
  setTimeout(()=>ssoSuccess('Bienvenido, '+email.split('@')[0]),1300);
}
function ssoSuccess(msg){
  document.getElementById('sso-form').innerHTML=`<div class="sso-success"><div class="sso-check"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M5 13l4 4L19 7"/></svg></div><div class="sso-wlc">${msg}</div><div class="sso-wlc-sub">Cargando el sistema operativo…</div></div>`;
  setTimeout(()=>dismissSSO(),1100);
}
function dismissSSO(){
  const s=document.getElementById('sso');s.classList.add('out');
  setTimeout(()=>s.remove(),320);
}

renderNav2();setCrumb();render();
</script>
</body>
</html>
